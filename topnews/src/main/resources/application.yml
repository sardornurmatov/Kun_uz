server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/topnews_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: topnews_secret_key_very_long_and_secure_2024
  expiration: 86400000  # 24 soat (ms)

server-url: http://localhost:8080
