spring:
  application:
    name: kun-uz-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/kun_uz
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: kun-uz-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

logging:
  level:
    root: INFO
    uz.kun: DEBUG
